name: CI

# CI is intentionally minimal for F1 solo-dev phase:
# - Cheap style/type gates run here (catch formatting drift and TS
#   regressions the local pre-PR flow could skip).
# - The full `cargo test`, `pnpm test`, and `perf_smoke` battery is
#   authoritative LOCALLY (see CONTRIBUTING.md "Before opening a
#   PR"). Re-running on CI just duplicates runtime without adding
#   signal — revisit when >1 person pushes to this repo.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version:` here on purpose — `packageManager` in
      # package.json (pnpm@9.15.0) is the source of truth. Setting
      # both trips pnpm/action-setup with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'
      # Tauri's Linux build pulls GTK/webkit via tao/wry; clippy still
      # needs to compile the lib target to check it. Install the
      # minimal GTK deps so the runner resolves the system libraries.
      - run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: cargo fmt --all -- --check
      # `--no-default-features` skips STT engines that pull libclang/ONNX.
      # `--lib --tests` skips the Tauri binary entrypoint (adds nothing
      # that the lib doesn't already cover).
      - run: cargo clippy --workspace --lib --tests --no-default-features -- -D warnings
        working-directory: ./src-tauri
