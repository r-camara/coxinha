name: CI

# CI is intentionally minimal for F1 solo-dev phase:
# - Cheap style/type gates run here (catch formatting drift and TS
#   regressions the local pre-PR flow could skip).
# - The full `cargo test`, `pnpm test`, and `perf_smoke` battery is
#   authoritative LOCALLY (see CONTRIBUTING.md "Before opening a
#   PR"). Re-running on CI just duplicates runtime without adding
#   signal — revisit when >1 person pushes to this repo.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version:` here on purpose — `packageManager` in
      # package.json (pnpm@9.15.0) is the source of truth. Setting
      # both trips pnpm/action-setup with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'
      - run: cargo fmt --all -- --check
      # Scope:
      # - `--lib --tests` keeps us off the Tauri binary, which pulls
      #   glib/GTK system deps we don't want to install on the runner.
      # - `--no-default-features` skips STT engines that pull
      #   libclang/ONNX — the default dev loop already runs without them.
      - run: cargo clippy --workspace --lib --tests --no-default-features -- -D warnings
        working-directory: ./src-tauri
