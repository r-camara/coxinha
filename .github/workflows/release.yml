name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'

      # CUDA Toolkit for GPU builds (whisper-rs cuda feature + ort cuda)
      - uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: '12.6.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (release + cuda)
        run: pnpm tauri build --features full-release

      - name: Upload MSI + NSIS
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Placeholders for macOS and Linux — enable when supported
  build-macos:
    if: false
    runs-on: macos-latest
    steps:
      - run: echo "TODO"

  build-linux:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "TODO"
