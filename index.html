<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/coxinha.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coxinha</title>
    <!-- Fonts loaded here (not via CSS @import) because Tailwind 4's
         @import "tailwindcss" expands inline during PostCSS and
         displaces our font @import past the spec-mandated "imports
         must come first" rule. <link> sidesteps the dependency. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
