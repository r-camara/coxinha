<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <!--
    app-shell-desired.svg — 2026-04-20
    Target layout after spec 0039 (router) + spec 0042 (empty state + max-width).
    Main changes vs current:
      1. URL routes replace App.tsx's useState<View> — /, /notes, /notes/$id, /agenda, /meetings, /settings
      2. Empty state is a full-bleed editor on a transient draft — type to persist, blur-empty to discard
      3. Main pane has a reading max-width (~720 px) centered in the available space on wide viewports
      4. No centered CTA; no "form gate"
  -->

  <!-- Window chrome -->
  <rect width="1440" height="900" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Sidebar (unchanged width, tokens match current) -->
  <rect x="0" y="0" width="288" height="900" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="1"/>
  <text x="16" y="38" font-size="18" font-weight="700" fill="#111827">Coxinha</text>
  <rect x="220" y="20" width="52" height="24" rx="4" fill="#de8c3a"/>
  <text x="234" y="37" font-size="11" fill="#ffffff">+ New</text>

  <rect x="8" y="60" width="272" height="32" rx="4" fill="#e9e9e9"/>
  <text x="32" y="80" font-size="13" fill="#111827">📝 Notes</text>
  <rect x="8" y="96" width="272" height="32" rx="4" fill="transparent"/>
  <text x="32" y="116" font-size="13" fill="#374151">📅 Agenda</text>
  <rect x="8" y="132" width="272" height="32" rx="4" fill="transparent"/>
  <text x="32" y="152" font-size="13" fill="#374151">🎙 Meetings</text>

  <rect x="16" y="184" width="256" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="28" y="202" font-size="12" fill="#9ca3af">🔎 Search notes…</text>

  <text x="16" y="244" font-size="10" fill="#6b7280" letter-spacing="1">RECENT</text>
  <rect x="8" y="252" width="272" height="28" rx="4" fill="transparent"/>
  <text x="16" y="270" font-size="13" fill="#111827">Alpha note</text>
  <rect x="8" y="284" width="272" height="28" rx="4" fill="transparent"/>
  <text x="16" y="302" font-size="13" fill="#111827">Beta note</text>

  <rect x="8" y="848" width="272" height="32" rx="4" fill="transparent"/>
  <text x="32" y="868" font-size="13" fill="#374151">⚙ Settings</text>

  <!-- Main pane: full-bleed editor with a reading max-width -->
  <rect x="288" y="0" width="1152" height="900" fill="#ffffff"/>

  <!-- Reading column (~720 px) centered in the remaining 1152 px main pane -->
  <!-- (1152 - 720) / 2 = 216 px margins each side -->
  <rect x="504" y="64" width="720" height="772" fill="#fafafa" stroke="#f3f4f6" stroke-dasharray="4 4"/>

  <!-- Placeholder text in the editor -->
  <text x="540" y="110" font-size="16" fill="#9ca3af" font-style="italic" opacity="0.6">Type to start.</text>

  <!-- Cursor -->
  <line x1="536" y1="90" x2="536" y2="115" stroke="#111827" stroke-width="1.5">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Backlinks panel placeholder on the right — shown only when viewing a persisted note -->
  <rect x="1184" y="0" width="256" height="900" fill="#fafafa" stroke="#f3f4f6" stroke-dasharray="4 4"/>
  <text x="1200" y="32" font-size="10" fill="#9ca3af" letter-spacing="1">LINKED FROM</text>
  <text x="1200" y="52" font-size="11" fill="#9ca3af" font-style="italic">(only on /notes/$id)</text>

  <!-- Callouts -->
  <g font-size="11" fill="#16a34a">
    <text x="308" y="32">✓ URL routes: / → /notes → /notes/$noteId</text>
    <text x="308" y="50">✓ Ctrl+Alt+Shift+N (+ Win-key candidate — see agent report)</text>
    <text x="308" y="68">✓ Full-bleed editor on /notes when no selection</text>
    <text x="308" y="86">✓ Max-width 720 on wide viewports (reading width)</text>
  </g>

  <!-- Max-width annotation -->
  <line x1="504" y1="876" x2="1224" y2="876" stroke="#16a34a" stroke-width="1"/>
  <text x="864" y="893" font-size="10" fill="#16a34a" text-anchor="middle">720 px reading column · centered in 1152 px main</text>
</svg>
