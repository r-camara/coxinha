<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, system-ui, sans-serif">
  <!--
    empty-state-current.svg — close-up of the centered-CTA empty state
    today. "No note selected." + button → reads as a form gate.
  -->
  <rect width="800" height="500" fill="#ffffff" stroke="#e5e7eb"/>

  <!-- Centered content -->
  <text x="400" y="232" font-size="14" fill="#6b7280" text-anchor="middle">No note selected.</text>
  <rect x="296" y="252" width="208" height="36" rx="6" fill="#de8c3a"/>
  <text x="400" y="275" font-size="13" fill="#ffffff" text-anchor="middle">New note (Ctrl+Alt+N)</text>

  <!-- Annotations -->
  <g font-size="11" fill="#dc2626">
    <text x="16" y="28">Problem</text>
  </g>
  <g font-size="12" fill="#374151">
    <text x="16" y="48">◾ Centered CTA reads as a form gate — "click here to begin"</text>
    <text x="16" y="66">◾ User has to decide "do I want a note?" before writing</text>
    <text x="16" y="84">◾ Shortcut in button is broken anyway</text>
    <text x="16" y="102">◾ Empty bands on sides scale poorly to wide monitors</text>
  </g>
</svg>
